<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Raza Education Hub</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0b5d3f;
}

.login-box{
background:#fff;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#0b5d3f;
}

.login-box input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

.login-box button{
width:100%;
padding:14px;
background:#0b5d3f;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

.login-box button:hover{
background:#08442e;
}

.login-box p{
text-align:center;
margin-top:20px;
}

.login-box a{
color:#0b5d3f;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form id="loginForm">



<input
id="email"
type="email"
placeholder="Enter Email"
required>

<input
id="password"
type="password"
placeholder="Enter Password"
required>
  
<button type="submit">
Login
</button>

</form>

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

<p>

<a href="index.html">

⬅ Back To Home

</a>

</p>

</div>
<script type="module">

import supabase from "./supabase.js";

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

const { error } = await supabase.auth.signInWithPassword({

email,

password

});

if(error){

alert("Login Failed: "+error.message);

}else{

alert("Login Successful");

window.location.href="dashboard.html";

}

});

</script>
</body>
</html>
