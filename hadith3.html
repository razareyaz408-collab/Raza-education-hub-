<h2>Arabic</h2>

<p>
بُنِيَ الإِسْلَامُ عَلَى خَمْسٍ
</p>

<h2>Tarjuma</h2>

<p>
"Islam ki bunyad paanch cheezon par rakhi gayi hai."
</p>

<h2>Aasan Samajh</h2>

<p>
Islam ke paanch bunyadi arkaan hain:
Shahadat, Namaz, Zakat, Roza aur Hajj (jo istita'at rakhta ho).
</p>

<h2>Hawala</h2>

<p>
📚 Sahih al-Bukhari: 8<br>
📚 Sahih Muslim: 16
</p>
