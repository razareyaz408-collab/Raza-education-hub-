<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account - Raza Education Hub</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0b5d3f;
}

.signup-box{
background:#fff;
padding:40px;
border-radius:15px;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.signup-box h2{
text-align:center;
color:#0b5d3f;
margin-bottom:25px;
}

.signup-box input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

.signup-box button{
width:100%;
padding:14px;
background:#0b5d3f;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

.signup-box button:hover{
background:#08442e;
}

.signup-box p{
text-align:center;
margin-top:20px;
}

.signup-box a{
text-decoration:none;
color:#0b5d3f;
font-weight:bold;
}

</style>

</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<input type="password" placeholder="Confirm Password" required>

<button type="submit">
Create Account
</button>

</form>

<p>

Already have an account?

<a href="login.html">
Login
</a>

</p>

<p>

<a href="index.html">
⬅ Back To Home
</a>

</p>

</div>

</body>
</html>
