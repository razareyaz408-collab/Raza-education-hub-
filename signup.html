<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Raza Education Hub</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">

🕌 Raza Education Hub

</div>

<nav>

<a href="index.html">🏠 Home</a>

<a href="login.html">🔐 Login</a>

</nav>

</header>

<section class="features">

<h2>Create Your Free Account</h2>

<div class="card" style="max-width:550px;margin:auto;">

<form>

<input
type="text"
placeholder="👤 Full Name"
required
style="width:100%;padding:15px;margin-bottom:15px;">

<input
type="email"
placeholder="📧 Email Address"
required
style="width:100%;padding:15px;margin-bottom:15px;">

<input
type="tel"
placeholder="📱 Mobile Number"
required
style="width:100%;padding:15px;margin-bottom:15px;">

<input
type="password"
placeholder="🔒 Password"
required
style="width:100%;padding:15px;margin-bottom:15px;">

<input
type="password"
placeholder="🔐 Confirm Password"
required
style="width:100%;padding:15px;margin-bottom:20px;">

<button
type="submit"
class="hero-btn"
style="width:100%;border:none;cursor:pointer;">

Create Account

</button>

</form>

<br>

<p style="text-align:center;">

Already have an account?

<a href="login.html">

Login Now

</a>

</p>

</div>

</section>

<footer>

<p>

© 2026 Raza Education Hub

</p>

</footer>

<script src="script.js"></script>

</body>

</html>
