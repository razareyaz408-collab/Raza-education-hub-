<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>

<header>

<div class="logo">
🕌 Raza Education Hub
</div>

<nav>

<a href="index.html">🏠 Home</a>

<a href="login.html">🔐 Login</a>

</nav>

</header>

<section class="features">

<h2>Create Free Account</h2>

<div class="card">

<form id="signupForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<br><br>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<br><br>

<input
type="password"
id="password"
placeholder="Password"
required>

<br><br>

<button
type="submit"
class="hero-btn">

Create Account

</button>

</form>

<p style="margin-top:20px;">

Already have an account?

<a href="login.html">

Login Here

</a>

</p>

</div>

</section>

<footer>

<p>

© 2026 Raza Education Hub

</p>

</footer>
