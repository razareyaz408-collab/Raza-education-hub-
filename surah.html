<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read Surah | Raza Education Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins,sans-serif;
background:#f4f7f5;
margin:0;
}

header{
background:#0b6b43;
color:#fff;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.arabic{
font-size:34px;
text-align:right;
line-height:2;
margin:20px 0;
}

.translation{
font-size:18px;
line-height:1.8;
}

.back{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#0b6b43;
color:#fff;
text-decoration:none;
border-radius:8px;
}
</style>

</head>
<body>

<header>
<h1 id="surahName">Surah</h1>
</header>

<div class="container">

<div class="card">

<div class="arabic">
بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
</div>

<div class="translation">
<strong>Translation:</strong><br>
In the name of Allah, the Most Compassionate, the Most Merciful.
</div>

<a href="quran.html" class="back">⬅ Back to Surah List</a>

</div>

</div>

<script>
const params=new URLSearchParams(window.location.search);
const id=params.get("id");

const names=[
"Al-Fatihah",
"Al-Baqarah",
"Aal-e-Imran",
"An-Nisa",
"Al-Ma'idah",
"Al-An'am",
"Al-A'raf",
"Al-Anfal",
"At-Tawbah",
"Yunus"
];

if(id && names[id-1]){
document.getElementById("surahName").innerText="Surah "+names[id-1];
}
</script>

</body>
</html>
