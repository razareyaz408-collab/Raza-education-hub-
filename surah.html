<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read Surah | Raza Education Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins,sans-serif;
background:#f4f7f5;
margin:0;
}

header{
background:#0b6b43;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.arabic{
font-size:32px;
text-align:right;
line-height:2.2;
margin-bottom:15px;
}

.translation{
font-size:18px;
line-height:1.8;
margin-bottom:20px;
}

.back{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#0b6b43;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>

</head>
<body>

<header>
<h1 id="surahName">Loading...</h1>
</header>

<div class="container">

<div class="card" id="surahContent">
Loading Surah...
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || 1;

async function loadSurah(){

try{

const response = await fetch(
`https://api.alquran.cloud/v1/surah/${id}/editions/quran-uthmani,en.asad`
);

const data = await response.json();

const arabic = data.data[0];
const english = data.data[1];

document.getElementById("surahName").innerText =
arabic.englishName;

let html = "";

for(let i=0;i<arabic.ayahs.length;i++){

html += `
<div style="margin-bottom:25px;">
<div class="arabic">${arabic.ayahs[i].text}</div>
<div class="translation">${english.ayahs[i].text}</div>
<hr>
</div>
`;

}

html += `<a href="quran.html" class="back">⬅ Back to Quran</a>`;

document.getElementById("surahContent").innerHTML = html;

}catch(e){

document.getElementById("surahContent").innerHTML =
"<h2>❌ Surah load nahi ho saki.</h2>";

}

}

loadSurah();
</script>

<script>
const search = document.querySelector(".search");

search.addEventListener("keyup", function () {
    const value = this.value.toLowerCase();
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        if (text.includes(value)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});
</script>  
  
</body>
</html>
